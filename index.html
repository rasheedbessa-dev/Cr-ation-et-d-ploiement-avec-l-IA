<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeTunes - Lecteur de Musique</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #252542;
            --accent: #e94560;
            --accent-secondary: #533483;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #6c6c7d;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        #app-header {
            text-align: center;
            padding: 2rem 1rem 1rem;
            position: relative;
        }

        #app-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560, #533483);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        #search-container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        #search-input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: var(--glass);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        #search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.2);
        }

        #search-input::placeholder {
            color: var(--text-muted);
        }

        /* ===== MAIN PLAYER ===== */
        #main-player {
            max-width: 400px;
            margin: 2rem auto;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        #main-player::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(233, 69, 96, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        #album-cover-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 1.5rem;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        #album-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        #album-cover.playing {
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #track-info {
            position: relative;
            z-index: 1;
        }

        #track-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #track-artist {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        /* ===== PROGRESS BAR ===== */
        #progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 1.5rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
            position: relative;
        }

        #progress-bar::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        #progress-container:hover #progress-bar::after {
            opacity: 1;
        }

        #time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* ===== CONTROLS ===== */
        #player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            transform: scale(1.1);
            color: var(--accent);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        #play-pause-btn {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
        }

        #play-pause-btn:hover {
            box-shadow: 0 6px 30px rgba(233, 69, 96, 0.6);
            transform: scale(1.05);
        }

        /* ===== TOP TRACKS SECTION ===== */
        #top-tracks-section {
            padding: 2rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        #section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-left: 0.5rem;
            border-left: 4px solid var(--accent);
        }

        #tracks-scroll-container {
            display: flex;
            gap: 1.25rem;
            overflow-x: auto;
            padding-bottom: 1rem;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        #tracks-scroll-container::-webkit-scrollbar {
            height: 6px;
        }

        #tracks-scroll-container::-webkit-scrollbar-track {
            background: transparent;
        }

        #tracks-scroll-container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .track-card {
            min-width: 180px;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .track-card:hover {
            transform: translateY(-5px);
            background: var(--bg-card-hover);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: var(--accent);
        }

        .track-card-cover {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 0.75rem;
            position: relative;
        }

        .track-card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .track-card:hover .track-card-cover img {
            transform: scale(1.1);
        }

        .track-card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .track-card:hover .track-card-overlay {
            opacity: 1;
        }

        .track-card-title {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
        }

        .track-card-artist {
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== LOADING & ERROR STATES ===== */
        #loading-indicator {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(233, 69, 96, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #error-message {
            text-align: center;
            padding: 2rem;
            color: var(--accent);
            background: rgba(233, 69, 96, 0.1);
            border-radius: 12px;
            margin: 1rem;
        }

        /* ===== VISUALIZER ===== */
        #visualizer {
            display: flex;
            justify-content: center;
            gap: 3px;
            height: 30px;
            margin-bottom: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #visualizer.active {
            opacity: 1;
        }

        .bar {
            width: 4px;
            background: linear-gradient(to top, var(--accent), var(--accent-secondary));
            border-radius: 2px;
            animation: bounce 0.5s ease-in-out infinite alternate;
        }

        .bar:nth-child(1) { height: 20%; animation-delay: 0s; }
        .bar:nth-child(2) { height: 40%; animation-delay: 0.1s; }
        .bar:nth-child(3) { height: 60%; animation-delay: 0.2s; }
        .bar:nth-child(4) { height: 30%; animation-delay: 0.3s; }
        .bar:nth-child(5) { height: 50%; animation-delay: 0.4s; }
        .bar:nth-child(6) { height: 70%; animation-delay: 0.5s; }
        .bar:nth-child(7) { height: 40%; animation-delay: 0.6s; }

        @keyframes bounce {
            to { height: 100%; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            #app-title {
                font-size: 1.75rem;
            }

            #main-player {
                margin: 1rem;
                padding: 1.5rem;
            }

            #album-cover-container {
                width: 200px;
                height: 200px;
            }

            .track-card {
                min-width: 150px;
            }
        }

        /* ===== GENRE SELECTOR ===== */
        #genre-selector {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            padding: 0 1rem;
        }

        .genre-btn {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .genre-btn:hover, .genre-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* ===== FALLBACK NOTICE ===== */
        #fallback-notice {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            color: #ffc107;
            padding: 1rem;
            border-radius: 12px;
            margin: 1rem auto;
            max-width: 600px;
            text-align: center;
            font-size: 0.9rem;
        }

        #fallback-notice.hidden {
            display: none;
        }
    </style>
<base target="_blank">

<body>
    <!-- HEADER -->
    <header id="app-header">
        <h1 id="app-title">VibeTunes</h1>
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Rechercher un artiste, une chanson..." autocomplete="off">
        </div>
    </header>

    <!-- FALLBACK NOTICE -->
    <div id="fallback-notice" class="hidden">
        ⚠️ Mode hors-ligne activé : utilisation de la playlist de démonstration
    </div>

    <!-- GENRE SELECTOR -->
    <div id="genre-selector">
        <button class="genre-btn active" data-genre="lofi">Lo-Fi</button>
        <button class="genre-btn" data-genre="pop">Pop</button>
        <button class="genre-btn" data-genre="rock">Rock</button>
        <button class="genre-btn" data-genre="electro">Electro</button>
        <button class="genre-btn" data-genre="jazz">Jazz</button>
    </div>

    <!-- MAIN PLAYER -->
    <section id="main-player">
        <div id="album-cover-container">
            <img id="album-cover" src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400&h=400&fit=crop" alt="Pochette album">
        </div>

        <div id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div id="track-info">
            <h2 id="track-title">Sélectionnez une chanson</h2>
            <p id="track-artist">VibeTunes Player</p>
        </div>

        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="time-display">
            <span id="current-time">0:00</span>
            <span id="total-time">0:00</span>
        </div>

        <div id="player-controls">
            <button class="control-btn" id="prev-btn" title="Précédent">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                </svg>
            </button>

            <button class="control-btn" id="play-pause-btn" title="Lecture/Pause">
                <svg id="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg id="pause-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>

            <button class="control-btn" id="next-btn" title="Suivant">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                </svg>
            </button>
        </div>
    </section>

    <!-- TOP TRACKS -->
    <section id="top-tracks-section">
        <h2 id="section-title">Top Tracks</h2>
        <div id="tracks-scroll-container">
            <div id="loading-indicator">
                <div class="spinner"></div>
                <p>Chargement des morceaux...</p>
            </div>
        </div>
    </section>

    <script>
        // ===== DEMO PLAYLIST (Fallback si API indisponible) =====
        const DEMO_PLAYLIST = [
            {
                id: 1,
                title: "Midnight City",
                artist: "M83",
                preview: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                cover: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=400&h=400&fit=crop",
                duration: 30
            },
            {
                id: 2,
                title: "Starboy",
                artist: "The Weeknd",
                preview: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                cover: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400&h=400&fit=crop",
                duration: 30
            },
            {
                id: 3,
                title: "Blinding Lights",
                artist: "The Weeknd",
                preview: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
                cover: "https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=400&h=400&fit=crop",
                duration: 30
            },
            {
                id: 4,
                title: "Levitating",
                artist: "Dua Lipa",
                preview: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
                cover: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400&h=400&fit=crop",
                duration: 30
            },
            {
                id: 5,
                title: "Heat Waves",
                artist: "Glass Animals",
                preview: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",
                cover: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400&h=400&fit=crop",
                duration: 30
            },
            {
                id: 6,
                title: "Stay",
                artist: "Justin Bieber",
                preview: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3",
                cover: "https://images.unsplash.com/photo-1506157786151-b8491531f063?w=400&h=400&fit=crop",
                duration: 30
            },
            {
                id: 7,
                title: "Good 4 U",
                artist: "Olivia Rodrigo",
                preview: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3",
                cover: "https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?w=400&h=400&fit=crop",
                duration: 30
            },
            {
                id: 8,
                title: "Montero",
                artist: "Lil Nas X",
                preview: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3",
                cover: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=400&h=400&fit=crop",
                duration: 30
            }
        ];

        // ===== STATE =====
        let songs = [];
        let currentIndex = 0;
        let isPlaying = false;
        let audio = new Audio();
        let progressInterval;
        let isFallbackMode = false;

        // ===== DOM ELEMENTS =====
        const albumCover = document.getElementById('album-cover');
        const trackTitle = document.getElementById('track-title');
        const trackArtist = document.getElementById('track-artist');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const tracksContainer = document.getElementById('tracks-scroll-container');
        const searchInput = document.getElementById('search-input');
        const visualizer = document.getElementById('visualizer');
        const genreButtons = document.querySelectorAll('.genre-btn');
        const fallbackNotice = document.getElementById('fallback-notice');

        // ===== FETCH SONGS FROM DEEZER (avec proxy CORS) =====
        async function fetchSongs(query = 'lofi') {
            try {
                tracksContainer.innerHTML = `
                    <div id="loading-indicator">
                        <div class="spinner"></div>
                        <p>Chargement des morceaux...</p>
                    </div>
                `;

                // Essayer avec un proxy CORS public
                const proxyUrls = [
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://api.deezer.com/search?q=${query}&limit=15`)}`,
                    `https://corsproxy.io/?${encodeURIComponent(`https://api.deezer.com/search?q=${query}&limit=15`)}`,
                    `https://api.deezer.com/search?q=${query}&limit=15&output=jsonp&callback=callback`
                ];

                let response = null;
                let lastError = null;

                for (const url of proxyUrls) {
                    try {
                        const res = await fetch(url, { 
                            method: 'GET',
                            headers: { 'Accept': 'application/json' }
                        });
                        if (res.ok) {
                            response = res;
                            break;
                        }
                    } catch (e) {
                        lastError = e;
                        continue;
                    }
                }

                if (!response) {
                    throw new Error('CORS blocked - using fallback');
                }

                const data = await response.json();

                if (!data.data || data.data.length === 0) {
                    throw new Error('Aucun résultat trouvé');
                }

                songs = data.data.map(track => ({
                    id: track.id,
                    title: track.title,
                    artist: track.artist.name,
                    preview: track.preview,
                    cover: track.album.cover_big || track.album.cover,
                    duration: track.duration
                }));

                isFallbackMode = false;
                fallbackNotice.classList.add('hidden');
                renderTracks();
                if (songs.length > 0) {
                    loadTrack(0);
                }
            } catch (error) {
                console.warn('API Deezer indisponible, mode fallback activé:', error.message);
                activateFallbackMode();
            }
        }

        // ===== FALLBACK MODE =====
        function activateFallbackMode() {
            isFallbackMode = true;
            fallbackNotice.classList.remove('hidden');
            songs = [...DEMO_PLAYLIST];
            renderTracks();
            loadTrack(0);
        }

        // ===== RENDER TRACK CARDS =====
        function renderTracks() {
            tracksContainer.innerHTML = '';
            songs.forEach((song, index) => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.innerHTML = `
                    <div class="track-card-cover">
                        <img src="${song.cover}" alt="${song.title}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400&h=400&fit=crop'">
                        <div class="track-card-overlay">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="track-card-title">${song.title}</div>
                    <div class="track-card-artist">${song.artist}</div>
                `;
                card.addEventListener('click', () => loadTrack(index));
                tracksContainer.appendChild(card);
            });
        }

        // ===== LOAD TRACK =====
        function loadTrack(index) {
            if (index < 0) index = songs.length - 1;
            if (index >= songs.length) index = 0;

            currentIndex = index;
            const song = songs[index];

            albumCover.src = song.cover;
            trackTitle.textContent = song.title;
            trackArtist.textContent = song.artist;

            audio.src = song.preview;
            audio.load();

            // Reset progress
            progressBar.style.width = '0%';
            currentTimeEl.textContent = '0:00';
            totalTimeEl.textContent = formatTime(song.duration || 30);

            // Auto-play
            playTrack();

            // Highlight current card
            document.querySelectorAll('.track-card').forEach((card, i) => {
                card.style.borderColor = i === index ? 'var(--accent)' : 'var(--border)';
            });
        }

        // ===== PLAY/PAUSE CONTROLS =====
        function playTrack() {
            audio.play().then(() => {
                isPlaying = true;
                updatePlayButton();
                albumCover.classList.add('playing');
                visualizer.classList.add('active');
                startProgressUpdate();
            }).catch(err => {
                console.error('Erreur lecture:', err);
            });
        }

        function pauseTrack() {
            audio.pause();
            isPlaying = false;
            updatePlayButton();
            albumCover.classList.remove('playing');
            visualizer.classList.remove('active');
            stopProgressUpdate();
        }

        function togglePlay() {
            if (isPlaying) {
                pauseTrack();
            } else {
                playTrack();
            }
        }

        function updatePlayButton() {
            if (isPlaying) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        // ===== PROGRESS BAR =====
        function startProgressUpdate() {
            progressInterval = setInterval(() => {
                if (audio.duration) {
                    const progress = (audio.currentTime / audio.duration) * 100;
                    progressBar.style.width = progress + '%';
                    currentTimeEl.textContent = formatTime(audio.currentTime);
                }
            }, 100);
        }

        function stopProgressUpdate() {
            clearInterval(progressInterval);
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Click on progress bar to seek
        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percentage = clickX / rect.width;
            if (audio.duration) {
                audio.currentTime = percentage * audio.duration;
            }
        });

        // ===== NAVIGATION =====
        prevBtn.addEventListener('click', () => loadTrack(currentIndex - 1));
        nextBtn.addEventListener('click', () => loadTrack(currentIndex + 1));
        playPauseBtn.addEventListener('click', togglePlay);

        // ===== SEARCH =====
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = e.target.value.trim();
                if (query) {
                    fetchSongs(query);
                }
            }, 500);
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (query) fetchSongs(query);
            }
        });

        // ===== GENRE SELECTOR =====
        genreButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                genreButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                fetchSongs(btn.dataset.genre);
            });
        });

        // ===== KEYBOARD CONTROLS =====
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                togglePlay();
            } else if (e.code === 'ArrowLeft' && e.ctrlKey) {
                loadTrack(currentIndex - 1);
            } else if (e.code === 'ArrowRight' && e.ctrlKey) {
                loadTrack(currentIndex + 1);
            }
        });

        // ===== AUDIO EVENTS =====
        audio.addEventListener('ended', () => {
            loadTrack(currentIndex + 1);
        });

        audio.addEventListener('error', () => {
            console.error('Erreur chargement audio');
            // Si erreur sur piste API, passer à la suivante
            if (!isFallbackMode) {
                loadTrack(currentIndex + 1);
            }
        });

        // ===== INIT =====
        fetchSongs('lofi');
    </script>
</body>
</html>
